name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 5 days at 08:00 UTC (well within the 7-day idle window)
    - cron: "0 8 */5 * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/products?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Response status: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase is active."
          else
            echo "Unexpected status $STATUS — check your secrets or Supabase project."
            exit 1
          fi
